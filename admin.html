<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Freshly Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#f4f8f7;
padding:20px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
color:#00695c;
}

input, textarea{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border-radius:12px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
background:#009688;
color:#fff;
border:none;
padding:14px 20px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#00796b;
}

textarea{
min-height:350px;
font-family:monospace;
}

.hidden{
display:none;
}

.note{
background:#e0f2f1;
padding:15px;
border-radius:12px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Freshly Admin Panel</h1>

<div id="loginBox">

<h3>Admin Login</h3>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

</div>

<div id="adminPanel"
class="hidden">

<h3>Edit Daily Fish Catch</h3>

<p>
Update fish prices,
stock or images below.
</p>

<textarea
id="jsonEditor">
</textarea>

<button onclick="copyJSON()">
Copy Updated JSON
</button>

<div class="note">

<b>How To Update</b>

<ol>
<li>Copy updated JSON</li>
<li>Open fish-data.json in GitHub</li>
<li>Click Edit</li>
<li>Paste new JSON</li>
<li>Commit Changes</li>
</ol>

</div>

</div>

</div>

<script>

const adminPassword =
"Freshly@348";

async function login(){

const pass =
document.getElementById(
'password'
).value;

if(pass === adminPassword){

document
.getElementById(
'loginBox'
)
.classList.add(
'hidden'
);

document
.getElementById(
'adminPanel'
)
.classList.remove(
'hidden'
);

loadJSON();

}else{

alert(
'Wrong Password'
);

}

}

async function loadJSON(){

try{

const response =
await fetch(
'fish-data.json'
);

const data =
await response.json();

document
.getElementById(
'jsonEditor'
)
.value =
JSON.stringify(
data,
null,
2
);

}catch(error){

alert(
'Unable to load fish data'
);

}

}

function copyJSON(){

const textarea =
document.getElementById(
'jsonEditor'
);

textarea.select();

document.execCommand(
'copy'
);

alert(
'JSON Copied'
);

}

</script>

</body>
</html>
